# Render blueprint for the ecfplat Streamlit app (elliptic-curves.info).
# Connect the GitHub repo in the Render dashboard and it picks this up,
# or use "New +" -> "Blueprint". Custom domains are added in the dashboard
# under Settings -> Custom Domains (see docs/DEPLOY.md).
services:
  - type: web
    name: ecfplat
    runtime: python
    plan: free             # spins down after ~15 idle min (30-60s cold start);
                           # upgrade to starter (~$7/mo) in the dashboard for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
